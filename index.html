<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Letroso Cross - Palavras Fáceis</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #0f2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            background: #fff6e8;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
            padding: 20px 16px 30px;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            background: #2c4a2e;
            padding: 10px 20px;
            border-radius: 60px;
            color: #f9f0c0;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .coins {
            background: #f7b32b;
            padding: 5px 16px;
            border-radius: 40px;
            color: #2c1e0a;
            display: flex;
            gap: 6px;
        }

        .level-box {
            background: #1f3b21;
            padding: 5px 16px;
            border-radius: 30px;
        }

        .word-slots {
            background: #e2cfb0;
            border-radius: 48px;
            padding: 18px 12px;
            margin: 10px 0 20px;
            box-shadow: inset 0 0 0 2px #fff0db, inset 0 0 0 5px #b58b5a;
        }

        .slot-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .slot-word {
            background: #8b694a;
            padding: 6px 10px;
            border-radius: 28px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slot-letter {
            background: #f5e5d1;
            width: 44px;
            height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #4a2a1a;
            border-radius: 16px;
            box-shadow: inset 0 -2px 0 #b6926e;
            text-transform: uppercase;
        }

        .slot-letter.filled {
            background: #6f9e6b;
            color: white;
            text-shadow: 0 1px 1px black;
        }

        .letter-wheel {
            background: #f3e5cd;
            border-radius: 80px;
            padding: 24px 12px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .letter-tile {
            width: 70px;
            height: 70px;
            background: #fff8ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #2d4a1e;
            text-transform: uppercase;
            box-shadow: 0 8px 0 #b48b54;
            cursor: pointer;
            transition: 0.07s linear;
        }

        .letter-tile:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b48b54;
        }

        .selected-area {
            background: #dbbc8c;
            border-radius: 56px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 12px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: #2c2b1f;
            margin: 15px 0;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        button {
            background: #2c4a2e;
            border: none;
            color: #fff2cf;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 0 #1a2f1a;
            cursor: pointer;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a2f1a;
        }

        .feedback {
            background: #1e2e1cbb;
            color: #ffefbf;
            border-radius: 40px;
            padding: 8px;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .letter-tile { width: 60px; height: 60px; font-size: 1.8rem; }
            .slot-letter { width: 36px; height: 46px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="top-bar">
        <div class="coins">🪙 <span id="coinCounter">0</span></div>
        <div class="level-box">📖 Nível <span id="levelNumber">1</span></div>
    </div>

    <div class="word-slots" id="wordSlotsContainer"></div>
    <div class="letter-wheel" id="letterWheel"></div>
    <div class="selected-area" id="selectedWordArea">🔤 toque nas letras</div>

    <div class="action-buttons">
        <button id="submitBtn">✨ ENVIAR</button>
        <button id="shuffleBtn">🔄 EMBARALHAR</button>
        <button id="hintBtn">💡 DICA (15 moedas)</button>
    </div>
    <div class="feedback" id="feedbackMsg">Forme palavras de 3+ letras</div>
</div>

<script>
    // ================= 30 NÍVEIS FIXOS COM PALAVRAS FÁCEIS =================
    const FIXED_LEVELS = [
        { letters: ["S","O","L"], words: ["SOL"] },
        { letters: ["L","O","B","O"], words: ["LOBO","BOLO"] },
        { letters: ["C","A","S","A"], words: ["CASA","SACA"] },
        { letters: ["T","R","I","L","H","A"], words: ["TRILHA","TILHA","LATIR"] },
        { letters: ["M","A","R"], words: ["MAR","RAM"] },
        { letters: ["F","O","G","O"], words: ["FOGO"] },
        { letters: ["P","E","I","X","E"], words: ["PEIXE"] },
        { letters: ["N","U","V","E","M"], words: ["NUVEM"] },
        { letters: ["V","E","N","T","O"], words: ["VENTO"] },
        { letters: ["R","O","S","A"], words: ["ROSA"] },
        { letters: ["L","U","A"], words: ["LUA"] },
        { letters: ["M","O","N","T","E"], words: ["MONTE"] },
        { letters: ["P","R","A","T","A"], words: ["PRATA"] },
        { letters: ["C","E","D","R","O"], words: ["CEDRO","CORDE"] },
        { letters: ["F","L","O","R"], words: ["FLOR"] },
        { letters: ["B","R","I","S","A"], words: ["BRISA"] },
        { letters: ["G","R","I","T","O"], words: ["GRITO"] },
        { letters: ["C","H","U","V","A"], words: ["CHUVA"] },
        { letters: ["D","O","C","E"], words: ["DOCE"] },
        { letters: ["P","A","Z"], words: ["PAZ"] },
        { letters: ["A","M","O","R"], words: ["AMOR","ROMÃ"] },
        { letters: ["R","I","O"], words: ["RIO"] },
        { letters: ["S","A","P","O"], words: ["SAPO","PASO"] },
        { letters: ["M","A","C","A","C","O"], words: ["MACACO"] },
        { letters: ["B","O","L","A"], words: ["BOLA"] },
        { letters: ["G","A","T","O"], words: ["GATO"] },
        { letters: ["C","A","N","E","C","A"], words: ["CECA","CANA"] },
        { letters: ["T","E","L","A"], words: ["TELA","LETA"] },
        { letters: ["F","E","R","R","O"], words: ["FERRO"] },
        { letters: ["V","I","D","A"], words: ["VIDA"] }
    ];

    let currentLevel = 1;
    let currentLetters = [];
    let targetWords = [];
    let foundWords = new Set();
    let coins = 200;        // moedas iniciais generosas
    let selectedIndices = [];

    // DOM
    const wheelDiv = document.getElementById("letterWheel");
    const slotsContainer = document.getElementById("wordSlotsContainer");
    const selectedArea = document.getElementById("selectedWordArea");
    const coinSpan = document.getElementById("coinCounter");
    const levelSpan = document.getElementById("levelNumber");
    const feedback = document.getElementById("feedbackMsg");

    // Salvar progresso
    function saveGame() {
        const save = {
            currentLevel, currentLetters, targetWords,
            foundWords: Array.from(foundWords), coins
        };
        localStorage.setItem("letrosoCross", JSON.stringify(save));
    }

    function loadGame() {
        const raw = localStorage.getItem("letrosoCross");
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            currentLevel = data.currentLevel;
            currentLetters = data.currentLetters;
            targetWords = data.targetWords;
            foundWords = new Set(data.foundWords);
            coins = data.coins;
            return true;
        } catch(e) { return false; }
    }

    // Embaralhar array
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    // Carregar nível (1 a 30)
    function loadLevel(levelNum) {
        foundWords.clear();
        selectedIndices = [];
        if (levelNum <= FIXED_LEVELS.length) {
            const lvl = FIXED_LEVELS[levelNum - 1];
            currentLetters = [...lvl.letters];
            targetWords = [...lvl.words];
        } else {
            // Níveis infinitos: geramos letras que formam palavras comuns pré-definidas
            generateInfiniteLevel(levelNum);
        }
        shuffleArray(currentLetters);
        renderWheel();
        renderSlots();
        updateCoinsUI();
        levelSpan.innerText = levelNum;
        selectedArea.innerHTML = "🔤 toque nas letras";
        feedback.innerText = `Nível ${levelNum} • Encontre: ${targetWords.join(", ")}`;
        saveGame();
    }

    // Geração de níveis infinitos com palavras fáceis
    function generateInfiniteLevel(levelNum) {
        // Banco de palavras curtas comuns para sortear
        const easyWordsBank = [
            "SOL", "MAR", "LUZ", "Vida", "Paz", "AMOR", "RUA", "ÁRVORE",
            "CÉU", "CHUVA", "FLOR", "BICHO", "GATO", "CÃO", "PEIXE", "PATO",
            "SAPO", "BOLA", "JOGO", "CASA", "ESCOLA", "CARRO", "FELIZ"
        ];
        // Escolhe 2~3 palavras aleatórias
        const numWords = 2 + Math.floor(Math.random() * 2);
        const selectedWords = [];
        const usedIndices = new Set();
        for (let i = 0; i < numWords; i++) {
            let idx;
            do { idx = Math.floor(Math.random() * easyWordsBank.length); } 
            while (usedIndices.has(idx));
            usedIndices.add(idx);
            selectedWords.push(easyWordsBank[idx].toUpperCase());
        }
        targetWords = selectedWords;
        // Criar conjunto de letras a partir das palavras (com repetições)
        let lettersArray = [];
        for (let w of targetWords) {
            for (let ch of w) lettersArray.push(ch);
        }
        // Adicionar 1 ou 2 letras extras para dificuldade leve
        const extras = ["A","E","O","S","R","M","T"];
        for (let i = 0; i < 2; i++) {
            lettersArray.push(extras[Math.floor(Math.random() * extras.length)]);
        }
        currentLetters = lettersArray;
    }

    function renderWheel() {
        wheelDiv.innerHTML = "";
        currentLetters.forEach((letter, idx) => {
            const tile = document.createElement("div");
            tile.className = "letter-tile";
            tile.innerText = letter;
            tile.setAttribute("data-idx", idx);
            tile.addEventListener("click", () => handleLetterClick(idx));
            // Suporte a toque
            tile.addEventListener("touchstart", (e) => { e.preventDefault(); handleLetterClick(idx); });
            wheelDiv.appendChild(tile);
        });
    }

    function handleLetterClick(idx) {
        if (selectedIndices.includes(idx)) return;
        selectedIndices.push(idx);
        updateSelectedDisplay();
        highlightSelected();
    }

    function updateSelectedDisplay() {
        const word = selectedIndices.map(i => currentLetters[i]).join('');
        if (word.length === 0) selectedArea.innerHTML = "🔤 toque nas letras";
        else selectedArea.innerHTML = word.split('').map(l => `<span style="background:#b8874b; padding:0 8px; border-radius:20px;">${l}</span>`).join(' ');
    }

    function highlightSelected() {
        const tiles = document.querySelectorAll(".letter-tile");
        tiles.forEach((tile, idx) => {
            if (selectedIndices.includes(idx)) {
                tile.style.background = "#d6a15a";
                tile.style.transform = "translateY(4px)";
                tile.style.boxShadow = "0 2px 0 #b48b54";
            } else {
                tile.style.background = "#fff8ea";
                tile.style.transform = "";
                tile.style.boxShadow = "0 8px 0 #b48b54";
            }
        });
    }

    function renderSlots() {
        slotsContainer.innerHTML = "";
        targetWords.forEach(word => {
            const wordDiv = document.createElement("div");
            wordDiv.className = "slot-word";
            const isFound = foundWords.has(word.toUpperCase());
            for (let i = 0; i < word.length; i++) {
                const slot = document.createElement("div");
                slot.className = "slot-letter";
                if (isFound) {
                    slot.innerText = word[i].toUpperCase();
                    slot.classList.add("filled");
                } else {
                    slot.innerText = "?";
                }
                wordDiv.appendChild(slot);
            }
            slotsContainer.appendChild(wordDiv);
        });
    }

    function submitWord() {
        if (selectedIndices.length < 3) {
            feedback.innerText = "❗ Palavra precisa ter pelo menos 3 letras!";
            return;
        }
        const attempt = selectedIndices.map(i => currentLetters[i]).join('').toUpperCase();
        const matchedWord = targetWords.find(w => w.toUpperCase() === attempt);
        if (matchedWord && !foundWords.has(attempt)) {
            foundWords.add(attempt);
            coins += 15;
            updateCoinsUI();
            feedback.innerText = `✅ Acertou! +15 moedas. Palavra: ${attempt}`;
            renderSlots();
            selectedIndices = [];
            updateSelectedDisplay();
            highlightSelected();

            // Verificar vitória
            const allFound = targetWords.every(w => foundWords.has(w.toUpperCase()));
            if (allFound) {
                feedback.innerText = `🎉 Nível ${currentLevel} completo! +60 moedas! 🎉`;
                coins += 60;
                updateCoinsUI();
                currentLevel++;
                loadLevel(currentLevel);
            }
            saveGame();
        } else {
            feedback.innerText = `❌ "${attempt}" não é uma palavra alvo ou já foi encontrada.`;
        }
    }

    function shuffleLetters() {
        shuffleArray(currentLetters);
        selectedIndices = [];
        renderWheel();
        updateSelectedDisplay();
        highlightSelected();
        feedback.innerText = "Letras embaralhadas! Tente de novo.";
        saveGame();
    }

    function useHint() {
        if (coins < 15) {
            feedback.innerText = "Moedas insuficientes! (custam 15)";
            return;
        }
        const missing = targetWords.filter(w => !foundWords.has(w.toUpperCase()));
        if (missing.length === 0) {
            feedback.innerText = "Você já encontrou todas as palavras! Avance de nível.";
            return;
        }
        const randomWord = missing[Math.floor(Math.random() * missing.length)];
        feedback.innerText = `💡 Dica: uma palavra tem ${randomWord.length} letras. Começa com "${randomWord[0]}" e termina com "${randomWord[randomWord.length-1]}".`;
        coins -= 15;
        updateCoinsUI();
        saveGame();
    }

    function updateCoinsUI() {
        coinSpan.innerText = coins;
    }

    // Inicialização
    function init() {
        const loaded = loadGame();
        if (loaded && currentLetters && currentLetters.length) {
            renderWheel();
            renderSlots();
            updateSelectedDisplay();
            highlightSelected();
            levelSpan.innerText = currentLevel;
            updateCoinsUI();
            feedback.innerText = `Bem-vindo de volta! Nível ${currentLevel}`;
        } else {
            currentLevel = 1;
            coins = 200;
            loadLevel(1);
        }
    }

    // Eventos
    document.getElementById("submitBtn").addEventListener("click", submitWord);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleLetters);
    document.getElementById("hintBtn").addEventListener("click", useHint);

    init();
</script>
</body>
  </html>
